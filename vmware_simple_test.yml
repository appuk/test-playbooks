---
- name: VMware Simple Test for Indirect Node Data
  hosts: localhost
  gather_facts: false
  collections:
    - community.vmware

  vars:
    vm_name: "test-indirect-node-vm"

  tasks:
    - name: Gather datacenter info
      community.vmware.vmware_datacenter_info:
      register: datacenter_info

    - name: Set datacenter name
      set_fact:
        datacenter_name: "{{ datacenter_info.datacenter_info[0].name }}"

    - name: Gather cluster info
      community.vmware.vmware_cluster_info:
        datacenter: "{{ datacenter_name }}"
      register: cluster_info

    - name: Gather datastore info
      community.vmware.vmware_datastore_info:
        datacenter: "{{ datacenter_name }}"
      register: datastore_info

    - name: Set discovered values
      set_fact:
        cluster_name: "{{ cluster_info.clusters.keys() | list | first }}"
        datastore_name: "{{ datastore_info.datastores[0].name }}"

    - name: Display discovered values
      debug:
        msg: |
          Using Datacenter: {{ datacenter_name }}
          Using Cluster: {{ cluster_name }}
          Using Datastore: {{ datastore_name }}

    - name: Create a virtual machine
      community.vmware.vmware_guest:
        datacenter: "{{ datacenter_name }}"
        name: "{{ vm_name }}"
        state: poweredon
        guest_id: "ubuntu64Guest"
        cluster: "{{ cluster_name }}"
        hardware:
          memory_mb: 512
          num_cpus: 1
        disk:
          - size_gb: 1
            type: thin
            datastore: "{{ datastore_name }}"
      register: vm_create_result

    - name: Display created VM
      debug:
        msg: |
          VM Created: {{ vm_create_result.instance.hw_name }}
          VM UUID: {{ vm_create_result.instance.instance_uuid }}
          VM Power State: {{ vm_create_result.instance.hw_power_status }}

    - name: Delete the virtual machine
      community.vmware.vmware_guest:
        datacenter: "{{ datacenter_name }}"
        name: "{{ vm_name }}"
        state: absent
        force: true
